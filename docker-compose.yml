services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: spotify_oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: spotify
      APP_USER_PASSWORD: spotify
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10

volumes:
  oracle_data:
